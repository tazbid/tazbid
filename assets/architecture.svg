<svg xmlns="http://www.w3.org/2000/svg" width="900" height="340" viewBox="0 0 900 340" fill="none">
  <rect width="900" height="340" rx="16" fill="#0f172a"/>
  <text x="32" y="40" fill="#f8fafc" font-family="ui-sans-serif, system-ui, sans-serif" font-size="20" font-weight="700">Multi-tenant system (example)</text>
  <text x="32" y="64" fill="#94a3b8" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13">How tenant traffic flows through a Laravel backend — from real estate platform work</text>

  <!-- clients -->
  <rect x="40" y="110" width="140" height="48" rx="10" fill="#1e293b" stroke="#a78bfa" stroke-width="2"/>
  <text x="110" y="140" text-anchor="middle" fill="#e9d5ff" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14">Tenant A</text>

  <rect x="40" y="175" width="140" height="48" rx="10" fill="#1e293b" stroke="#38bdf8" stroke-width="2"/>
  <text x="110" y="205" text-anchor="middle" fill="#bae6fd" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14">Tenant B</text>

  <rect x="40" y="240" width="140" height="48" rx="10" fill="#1e293b" stroke="#2dd4bf" stroke-width="2"/>
  <text x="110" y="270" text-anchor="middle" fill="#99f6e4" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14">Tenant C</text>

  <!-- arrows to api -->
  <line x1="180" y1="134" x2="280" y2="200" stroke="#64748b" stroke-width="2"/>
  <line x1="180" y1="199" x2="280" y2="200" stroke="#64748b" stroke-width="2"/>
  <line x1="180" y1="264" x2="280" y2="200" stroke="#64748b" stroke-width="2"/>

  <!-- laravel api -->
  <rect x="280" y="155" width="180" height="90" rx="12" fill="#134e4a" stroke="#2dd4bf" stroke-width="2"/>
  <text x="370" y="192" text-anchor="middle" fill="#f8fafc" font-family="ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="700">Laravel API</text>
  <text x="370" y="216" text-anchor="middle" fill="#99f6e4" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12">Auth · Routes · Business logic</text>

  <!-- arrow -->
  <line x1="460" y1="200" x2="540" y2="200" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <polygon points="540,194 555,200 540,206" fill="#64748b"/>

  <!-- data layer -->
  <rect x="560" y="100" width="160" height="56" rx="10" fill="#1e3a5f" stroke="#38bdf8" stroke-width="2"/>
  <text x="640" y="125" text-anchor="middle" fill="#f8fafc" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="600">MySQL</text>
  <text x="640" y="144" text-anchor="middle" fill="#bae6fd" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11">Isolated tenant data</text>

  <rect x="560" y="172" width="160" height="56" rx="10" fill="#3b1f1f" stroke="#f43f5e" stroke-width="2"/>
  <text x="640" y="197" text-anchor="middle" fill="#f8fafc" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="600">Redis</text>
  <text x="640" y="216" text-anchor="middle" fill="#fecdd3" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11">Cache &amp; queues</text>

  <rect x="560" y="244" width="160" height="56" rx="10" fill="#1e293b" stroke="#fbbf24" stroke-width="2"/>
  <text x="640" y="269" text-anchor="middle" fill="#f8fafc" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="600">Swagger</text>
  <text x="640" y="288" text-anchor="middle" fill="#fde68a" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11">API documentation</text>

  <!-- side note -->
  <text x="750" y="180" fill="#64748b" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12">Same app,</text>
  <text x="750" y="198" fill="#64748b" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12">separate data</text>
  <text x="750" y="216" fill="#64748b" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12">per tenant</text>
</svg>
