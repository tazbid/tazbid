<svg xmlns="http://www.w3.org/2000/svg" width="900" height="280" viewBox="0 0 900 280" fill="none">
  <rect width="900" height="280" rx="16" fill="#0f172a"/>
  <text x="32" y="40" fill="#f8fafc" font-family="ui-sans-serif, system-ui, sans-serif" font-size="20" font-weight="700">Career path</text>
  <text x="32" y="64" fill="#94a3b8" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13">From first Laravel apps to multi-tenant production APIs</text>

  <!-- line -->
  <line x1="80" y1="160" x2="820" y2="160" stroke="#334155" stroke-width="4" stroke-linecap="round"/>
  <line x1="80" y1="160" x2="820" y2="160" stroke="#2dd4bf" stroke-width="4" stroke-linecap="round" stroke-dasharray="740" stroke-dashoffset="0" stroke-opacity="0.35"/>

  <!-- node 1 -->
  <circle cx="140" cy="160" r="12" fill="#0f172a" stroke="#a78bfa" stroke-width="4"/>
  <circle cx="140" cy="160" r="5" fill="#a78bfa"/>
  <text x="140" y="110" text-anchor="middle" fill="#c4b5fd" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="600">CodersLab</text>
  <text x="140" y="130" text-anchor="middle" fill="#94a3b8" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11">Jr. Software Engineer</text>
  <text x="140" y="200" text-anchor="middle" fill="#64748b" font-family="ui-monospace, monospace" font-size="11">2021–2022</text>
  <text x="140" y="220" text-anchor="middle" fill="#64748b" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11">Laravel · APIs</text>

  <!-- node 2 -->
  <circle cx="400" cy="160" r="12" fill="#0f172a" stroke="#38bdf8" stroke-width="4"/>
  <circle cx="400" cy="160" r="5" fill="#38bdf8"/>
  <text x="400" y="110" text-anchor="middle" fill="#7dd3fc" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="600">Annonlab</text>
  <text x="400" y="130" text-anchor="middle" fill="#94a3b8" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11">Jr. Software Engineer</text>
  <text x="400" y="200" text-anchor="middle" fill="#64748b" font-family="ui-monospace, monospace" font-size="11">2022–2024</text>
  <text x="400" y="220" text-anchor="middle" fill="#64748b" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11">REST · PHP-JS</text>

  <!-- node 3 -->
  <circle cx="680" cy="160" r="12" fill="#0f172a" stroke="#2dd4bf" stroke-width="4"/>
  <circle cx="680" cy="160" r="5" fill="#2dd4bf"/>
  <text x="680" y="110" text-anchor="middle" fill="#5eead4" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="600">BluBird Interactive</text>
  <text x="680" y="130" text-anchor="middle" fill="#94a3b8" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12">Asst. Software Engineer.</text>
  <text x="680" y="200" text-anchor="middle" fill="#64748b" font-family="ui-monospace, monospace" font-size="11">2024–2026</text>
  <text x="680" y="220" text-anchor="middle" fill="#64748b" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11">APIs · Scale · Integrations</text>

